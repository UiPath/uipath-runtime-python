name: Test

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: false

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest]

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        if: "!(matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13')"
        run: uv run pytest

      - name: Run tests with coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: uv run pytest --cov-report=xml --cov-report=html --tb=short

      - name: Upload coverage HTML report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: htmlcov/
          retention-days: 30

      - name: Upload coverage XML report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13' && always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-report
          path: coverage.xml
          retention-days: 30

    continue-on-error: true

  sonarcloud:
    name: SonarCloud
    needs: test
    runs-on: ubuntu-latest
    if: always() && needs.test.result != 'failure'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: coverage-xml-report

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@2f77a1ec69fb1d595b06f35ab27e97605bdef703 # v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
